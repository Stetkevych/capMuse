<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="Assets/capmuse-auth.js"></script>
  <title>Home — CapMuse</title>
  <link rel="preconnect" href="https://capmuse-data-882611632216.s3.amazonaws.com" crossorigin />
  <link rel="dns-prefetch" href="https://capmuse-data-882611632216.s3.amazonaws.com" />
  <script src="capmuse-data.js"></script>
  <script>if (window.CapMuseData) window.CapMuseData.prefetch();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html[data-theme="dark"] {
      --page-bg: #0C0F14; --sidebar-bg: #111720; --sidebar-border: #1A2435; --topbar-border: #1A2435;
      --surface: #141C28; --surface-2: #1A2435; --text-primary: #F1F5F9; --text-secondary: #7A8FA8;
      --text-muted: #4A5F78; --nav-item-color: #8A9EBB; --nav-sub-color: #7A8FA8; --nav-active: #60A5FA;
      --nav-hover-bg: rgba(255,255,255,0.04); --nav-box-bg: rgba(255,255,255,0.04); --nav-box-border: rgba(255,255,255,0.07);
      --border: #1A2435; --search-border: #1A2435;
      --card-shadow: 0 1px 3px rgba(0,0,0,.5), 0 4px 16px rgba(0,0,0,.4);
      --hero-bg: linear-gradient(135deg, #0D1520 0%, #0F1D30 55%, #0C1A18 100%);
      --hero-border: rgba(96,165,250,0.18);
      --hero-glow: radial-gradient(circle at 80% 50%, rgba(37,99,235,0.18) 0%, transparent 60%);
    }
    html[data-theme="light"] {
      --page-bg: #EBEBEB; --sidebar-bg: #FFFFFF; --sidebar-border: #E8E8E8; --topbar-border: #E8E8E8;
      --surface: #FFFFFF; --surface-2: #F4F4F4; --text-primary: #111111; --text-secondary: #555555;
      --text-muted: #999999; --nav-item-color: #333333; --nav-sub-color: #444444; --nav-active: #2563EB;
      --nav-hover-bg: rgba(0,0,0,0.04); --nav-box-bg: #F4F4F4; --nav-box-border: transparent;
      --border: #E8E8E8; --search-border: #E0E0E0;
      --card-shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
      --hero-bg: linear-gradient(135deg, #EEF2FF 0%, #F0FDF4 100%);
      --hero-border: rgba(37,99,235,0.12);
      --hero-glow: radial-gradient(circle at 80% 50%, rgba(99,102,241,0.08) 0%, transparent 60%);
    }
    :root { --blue: #2563EB; --green: #10B981; --sidebar-w: 215px; --sidebar-gap: 16px; --ease: cubic-bezier(0.4,0,0.2,1); }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--page-bg); color: var(--text-primary); }
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar { width: var(--sidebar-w); position: fixed; left: var(--sidebar-gap); top: var(--sidebar-gap); bottom: var(--sidebar-gap); background: var(--sidebar-bg); border: 1px solid var(--sidebar-border); border-radius: 18px; box-shadow: 0 18px 45px rgba(15,23,42,0.12),0 3px 12px rgba(15,23,42,0.08); display: flex; flex-direction: column; z-index: 300; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; transition: transform 0.3s var(--ease); }
    .sidebar::-webkit-scrollbar { display: none; }
    .sidebar-logo { display: flex; align-items: center; gap: 9px; padding: 18px 18px 14px; flex-shrink: 0; }
    .sidebar-logo img { width: 30px; height: 30px; object-fit: contain; }
    .sidebar-wordmark { font-family: 'Orbitron',sans-serif; font-size: 14.5px; font-weight: 700; letter-spacing: 0.04em; background: linear-gradient(135deg,var(--blue),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sidebar-nav { flex: 1; padding: 6px 0 8px; display: flex; flex-direction: column; }
    .nav-section-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px; cursor: pointer; color: var(--nav-item-color); font-size: 14px; font-weight: 500; user-select: none; transition: color 0.15s ease; }
    .nav-section-toggle:hover { color: var(--text-primary); }
    .nav-section-toggle.active { color: var(--nav-active); font-weight: 600; }
    .toggle-left { display: flex; align-items: center; gap: 10px; }
    .toggle-icon { width: 17px; height: 17px; opacity: 0.7; flex-shrink: 0; }
    .toggle-chevron { width: 14px; height: 14px; color: var(--text-muted); transition: transform 0.2s ease; flex-shrink: 0; }
    .nav-section-toggle.open .toggle-chevron { transform: rotate(180deg); }
    .nav-sub { display: flex; flex-direction: column; overflow: hidden; max-height: 0; transition: max-height 0.25s var(--ease); }
    .nav-sub.open { max-height: 400px; }
    .nav-sub-item { display: flex; align-items: center; gap: 10px; padding: 7px 18px 7px 42px; color: var(--nav-sub-color); font-size: 13.5px; font-weight: 400; cursor: pointer; text-decoration: none; transition: color 0.12s ease, background-color 0.12s ease; }
    .nav-sub-item:hover { background: var(--nav-hover-bg); color: var(--text-primary); }
    .nav-sub-item.active { color: var(--nav-active); font-weight: 600; }
    .sub-icon { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.6; }
    .nav-sub-item.active .sub-icon { opacity: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; color: var(--nav-item-color); font-size: 14px; font-weight: 400; cursor: pointer; text-decoration: none; transition: color 0.12s ease, background-color 0.12s ease; }
    .nav-item:hover { background: var(--nav-hover-bg); color: var(--text-primary); }
    .nav-item.active { color: var(--nav-active); background: rgba(37,99,235,0.06); font-weight: 600; border-radius: 8px; margin: 0 8px; padding-left: 10px; }
    html[data-theme="dark"] .nav-item.active { background: rgba(96,165,250,0.08); }
    .nav-icon { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.65; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-divider { height: 1px; background: var(--sidebar-border); margin: 10px 0; }
    .sidebar-footer { padding: 10px; border-top: 1px solid var(--sidebar-border); flex-shrink: 0; }
    .sidebar-user { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s ease; }
    .sidebar-user:hover { background: var(--nav-hover-bg); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#0F4C81,#10B981); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 12px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 10.5px; color: var(--text-muted); }

    /* ── MAIN WRAPPER ── */
    .main-wrapper { margin-left: calc(var(--sidebar-w) + 32px); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    .topbar { position: sticky; top: 0; height: 72px; z-index: 200; display: flex; align-items: center; padding: 14px 28px 0; gap: 14px; }
    .burger { display: none; width: 32px; height: 32px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
    .search-wrap { flex: 0 1 640px; position: relative; max-width: 640px; min-width: 280px; }
    .search-icon-l { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); pointer-events: none; }
    .search-input { width: 100%; height: 42px; background: var(--surface); border: 1px solid var(--search-border); border-radius: 100px; color: var(--text-primary); font-family: inherit; font-size: 13.5px; padding: 0 40px 0 40px; outline: none; transition: border-color 0.18s ease; }
    .search-input:focus { border-color: var(--blue); }
    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
    .top-btn { width: 36px; height: 36px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.12s ease, color 0.12s ease; position: relative; }
    .top-btn:hover { background: var(--surface); color: var(--text-primary); }
    .top-btn svg { width: 18px; height: 18px; }
    .notif-pip { position: absolute; top: 4px; right: 4px; width: 7px; height: 7px; border-radius: 50%; background: var(--green); border: 2px solid var(--page-bg); }
    .top-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#0F4C81,#10B981); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; flex-shrink: 0; user-select: none; }
    .avatar-wrap { position: relative; }
    .avatar-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 160px; padding: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transform: translateY(-6px) scale(0.97); pointer-events: none; transition: opacity 0.15s ease, transform 0.15s ease; z-index: 200; }
    .avatar-menu.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .avatar-menu-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; text-decoration: none; transition: background 0.12s ease; }
    .avatar-menu-item:hover { background: var(--nav-hover-bg); }
    .avatar-menu-item.danger { color: #EF4444; }
    .avatar-menu-item.danger:hover { background: rgba(239,68,68,0.1); }
    .icon-moon { display: block; } .icon-sun { display: none; }
    html[data-theme="light"] .icon-moon { display: none; }
    html[data-theme="light"] .icon-sun  { display: block; }

    /* ── PAGE CONTENT ── */
    .page-content { flex: 1; padding: 8px 28px 56px; display: flex; flex-direction: column; gap: 28px; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
    .section-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .section-sub { font-size: 13px; color: var(--text-muted); }

    /* ── HERO ── */
    .home-hero {
      background: var(--hero-bg);
      border: 1px solid var(--hero-border);
      border-radius: 24px;
      padding: 40px 48px;
      display: flex;
      align-items: center;
      gap: 52px;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease-out both;
    }
    .home-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hero-glow);
      pointer-events: none;
    }

    .hero-photo-ring {
      width: 230px; height: 230px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #3B82F6 0%, #10B981 50%, #6366F1 100%);
      padding: 4px;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.25), 0 0 28px rgba(59,130,246,0.45), 0 0 60px rgba(59,130,246,0.2), 0 10px 40px rgba(0,0,0,0.45);
      animation: scaleIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.08s both;
      position: relative; z-index: 1;
      overflow: hidden;
    }
    .hero-photo-ring[data-person-id] {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hero-photo-ring[data-person-id]:hover {
      transform: scale(1.03);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.35), 0 0 36px rgba(59,130,246,0.55), 0 0 72px rgba(59,130,246,0.25), 0 12px 44px rgba(0,0,0,0.5);
    }
    .hero-photo-ring[data-person-id]:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 4px;
    }
    .hero-photo,
    .hero-photo-placeholder {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(100% - 8px);
      height: calc(100% - 8px);
      border-radius: 50%;
    }
    .hero-photo { object-fit: cover; object-position: center 8%; display: block; }
    .hero-photo-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #64748B 0%, #475569 100%);
      color: #F8FAFC;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 88px; font-weight: 700; line-height: 1;
      user-select: none;
    }
    .hero-photo[hidden],
    .hero-photo-placeholder[hidden] {
      display: none !important;
    }
    html[data-theme="dark"] .hero-photo-placeholder {
      background: linear-gradient(145deg, #334155 0%, #1E293B 100%);
      color: #CBD5E1;
    }

    .hero-info { flex: 1; animation: slideUp 0.52s ease-out 0.12s both; position: relative; z-index: 1; }
    .hero-greeting { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; letter-spacing: 0.01em; }
    .hero-name {
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 46px; font-weight: 800; line-height: 1.02;
      margin-bottom: 8px;
      background: linear-gradient(130deg, #111111 0%, #444444 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    html[data-theme="dark"] .hero-name {
      background: linear-gradient(130deg, #F1F5F9 0%, #93C5FD 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-meta { display: flex; flex-direction: column; gap: 2px; margin-bottom: 18px; }
    .hero-role-text { font-size: 16px; color: var(--text-secondary); font-weight: 500; }
    .hero-company-text { font-size: 14px; color: var(--text-muted); }
    .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .hbadge { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 11px; border-radius: 100px; }
    .hb-gold { background: rgba(245,158,11,0.14); color: #D97706; border: 1px solid rgba(245,158,11,0.28); }
    html[data-theme="dark"] .hb-gold { color: #FCD34D; }
    .hb-blue { background: rgba(37,99,235,0.1); color: #2563EB; border: 1px solid rgba(37,99,235,0.2); }
    html[data-theme="dark"] .hb-blue { color: #60A5FA; }
    .hb-green { background: rgba(16,185,129,0.1); color: #059669; border: 1px solid rgba(16,185,129,0.2); }
    html[data-theme="dark"] .hb-green { color: #34D399; }
    .hero-qs-row { display: flex; gap: 36px; }
    .hero-qs { display: flex; flex-direction: column; gap: 3px; }
    .hero-qs-val { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; }
    html[data-theme="dark"] .hero-qs-val { color: #F1F5F9; }
    .hero-qs-lbl { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }

    /* ── PERF STATS GRID ── */
    .perf-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .perf-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px 22px; display: flex; align-items: center; gap: 14px;
      box-shadow: var(--card-shadow); transition: transform 0.18s ease, box-shadow 0.18s ease;
      opacity: 0; animation: fadeInUp 0.42s ease-out both;
    }
    .perf-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
    .perf-card:nth-child(1) { animation-delay: 0.18s; }
    .perf-card:nth-child(2) { animation-delay: 0.23s; }
    .perf-card:nth-child(3) { animation-delay: 0.28s; }
    .perf-card:nth-child(4) { animation-delay: 0.33s; }
    .perf-card:nth-child(5) { animation-delay: 0.38s; }
    .perf-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pi-blue    { background: rgba(37,99,235,0.11); color: #2563EB; }
    html[data-theme="dark"] .pi-blue { color: #60A5FA; }
    .pi-green   { background: rgba(16,185,129,0.11); color: #059669; }
    html[data-theme="dark"] .pi-green { color: #34D399; }
    .pi-gold    { background: rgba(245,158,11,0.11); color: #D97706; }
    html[data-theme="dark"] .pi-gold { color: #FCD34D; }
    .pi-purple  { background: rgba(139,92,246,0.11); color: #7C3AED; }
    html[data-theme="dark"] .pi-purple { color: #C4B5FD; }
    .pi-crimson { background: rgba(239,68,68,0.11); color: #DC2626; }
    html[data-theme="dark"] .pi-crimson { color: #FCA5A5; }
    .pi-teal    { background: rgba(20,184,166,0.11); color: #0F766E; }
    html[data-theme="dark"] .pi-teal { color: #5EEAD4; }
    .perf-icon svg { width: 20px; height: 20px; }
    .perf-details { flex: 1; min-width: 0; }
    .perf-val { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.01em; color: var(--text-primary); line-height: 1.15; }
    .perf-lbl { font-size: 11.5px; color: var(--text-muted); font-weight: 500; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

    .section-header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .btn-compare-stats {
      display: inline-flex; align-items: center; gap: 8px;
      height: 40px; padding: 0 18px;
      border-radius: 11px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-primary);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      box-shadow: var(--card-shadow);
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }
    .btn-compare-stats:hover {
      transform: translateY(-1px);
      border-color: rgba(37,99,235,0.45);
      box-shadow: 0 6px 20px rgba(37,99,235,0.12);
    }
    .btn-compare-stats svg { width: 16px; height: 16px; color: var(--blue); flex-shrink: 0; }

    /* ── KPI CARDS ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; animation: fadeInUp 0.5s ease-out 0.44s both; }
    .kpi-card { border-radius: 16px; padding: 24px 26px; color: #fff; position: relative; overflow: hidden; transition: transform 0.18s ease; }
    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-card::after { content: ''; position: absolute; right: -18px; bottom: -18px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.07); pointer-events: none; }
    .kk1 { background: linear-gradient(135deg,#2D0F5E 0%,#4A1272 100%); }
    .kk2 { background: linear-gradient(135deg,#064E3B 0%,#0D9488 100%); }
    .kk3 { background: linear-gradient(135deg,#0F1F3D 0%,#162848 100%); }
    .kk4 { background: linear-gradient(135deg,#1a3f9e 0%,#1D4ED8 100%); }
    .kk5 { background: linear-gradient(135deg,#1E1B4B 0%,#3730A3 100%); }
    .kk6 { background: linear-gradient(135deg,#2A0505 0%,#7C1212 60%,#2A0A05 100%); }
    .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.7; margin-bottom: 10px; }
    .kpi-val { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
    .kpi-sub { font-size: 12px; opacity: 0.6; }

    /* ── BOTTOM ROW: ACTIVITY + CHART ── */
    .bottom-row { display: grid; grid-template-columns: 1fr 1.6fr; gap: 20px; animation: fadeInUp 0.5s ease-out 0.54s both; }
    .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 28px; box-shadow: var(--card-shadow); }

    /* Activity */
    .act-list { display: flex; flex-direction: column; }
    .act-item { display: flex; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .act-item:first-child { padding-top: 0; }
    .act-item:last-child { border-bottom: none; padding-bottom: 0; }
    .act-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-green  { background: #10B981; box-shadow: 0 0 7px rgba(16,185,129,0.6); }
    .dot-blue   { background: #3B82F6; box-shadow: 0 0 7px rgba(59,130,246,0.6); }
    .dot-gold   { background: #F59E0B; box-shadow: 0 0 7px rgba(245,158,11,0.6); }
    .dot-purple { background: #A855F7; box-shadow: 0 0 7px rgba(168,85,247,0.6); }z
    .act-text { font-size: 13.5px; font-weight: 500; color: var(--text-primary); line-height: 1.4; }
    .act-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Chart */
    .chart-wrap { position: relative; height: 230px; margin-top: 4px; }


    /* ── MOBILE OVERLAY ── */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 299; }
    .sidebar-overlay.open { display: block; }

    /* ── KEYFRAMES ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .perf-grid  { grid-template-columns: repeat(3, 1fr); }
      .actions-grid { grid-template-columns: repeat(5, 1fr); }
    }
    @media (max-width: 1000px) {
      .bottom-row { grid-template-columns: 1fr; }
      .actions-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 820px) {
      .perf-grid { grid-template-columns: repeat(2, 1fr); }
      .kpi-grid  { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * (var(--sidebar-w) + 32px))); }
      .sidebar.mobile-open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }

      .perf-grid { grid-template-columns: 1fr 1fr; }
      .kpi-grid  { grid-template-columns: 1fr 1fr; }
      .actions-grid { grid-template-columns: repeat(3, 1fr); }

<script>
/* ── Theme toggle ── */
(function () {
  let html = document.documentElement;
  let btn  = document.getElementById('themeBtn');
  let KEY  = 'capmuse-theme';
  let saved = localStorage.getItem(KEY);
  html.setAttribute('data-theme', saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
  btn.addEventListener('click', function () {
    let next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem(KEY, next);
  });
})();

/* ── Avatar dropdown ── */
(function () {
  let btn  = document.getElementById('avatarBtn');
  let menu = document.getElementById('avatarMenu');
  btn.addEventListener('click', function (e) { e.stopPropagation(); menu.classList.toggle('open'); });
  document.addEventListener('click', function () { menu.classList.remove('open'); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') menu.classList.remove('open'); });
})();

/* ── Mobile sidebar ── */
(function () {
  let burger  = document.getElementById('burgerBtn');
  let sidebar = document.getElementById('sidebar');
  let overlay = document.getElementById('sidebarOverlay');
  function open()  { sidebar.classList.add('mobile-open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; }
  function close() { sidebar.classList.remove('mobile-open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }
  burger.addEventListener('click', open);
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();

/* ── Sidebar section toggles ── */
document.querySelectorAll('.nav-section-toggle').forEach(function (toggle) {
  toggle.addEventListener('click', function () {
    let subId = this.id.replace('Toggle', 'Sub');
    let sub   = document.getElementById(subId);
    let open  = sub && sub.classList.contains('open');
    document.querySelectorAll('.nav-sub').forEach(function (s) { s.classList.remove('open'); });
    document.querySelectorAll('.nav-section-toggle').forEach(function (t) { t.classList.remove('open'); });
    if (!open && sub) { sub.classList.add('open'); this.classList.add('open'); }
  });
});

/* ── Main populate ── */
(function () {
  if (!window.CapMuseAuth.requireLogin()) return;
  window.CapMuseAuth.guardDemoPage();

  let userId = window.CapMuseAuth.getUserId();
  if (window.ensureRepProfile) userId = window.ensureRepProfile(userId);
  let rep = window.REPS[userId];
  if (!rep) return;

  let photoRing = document.getElementById('heroPhotoRing');
  if (photoRing) {
    photoRing.setAttribute('data-person-id', userId);
    photoRing.setAttribute('title', 'View your stats card');
    photoRing.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        photoRing.click();
      }
    });
  }

  let first = rep.name.split(' ')[0];

  /* Hero */
  if (window.setHeroRepPhoto) {
    window.setHeroRepPhoto(document.getElementById('heroPhotoRing'), document.getElementById('heroPhoto'), rep);
  }
  document.getElementById('heroGreeting').textContent = 'Welcome back, ' + first + ' 👋';
  document.getElementById('heroName').textContent     = rep.name;
  document.getElementById('heroRole').textContent     = rep.role;
  document.getElementById('heroCompany').textContent  = rep.company;
  document.title = 'Home — ' + rep.name + ' — CapMuse';

  document.getElementById('heroBadges').innerHTML =
    '<span class="hbadge hb-gold">' + rep.badge + '</span>' +
    '<span class="hbadge hb-blue">yrs exp</span>' +
    '<span class="hbadge hb-green">' + rep.company + '</span>';

  document.getElementById('heroQuickStats').innerHTML =
    '<div class="hero-qs"><span class="hero-qs-val"></span><span class="hero-qs-lbl">Volume today</span></div>' +
    '<div class="hero-qs"><span class="hero-qs-val"></span><span class="hero-qs-lbl">Funded today</span></div>' +
    '<div class="hero-qs"><span class="hero-qs-val"></span><span class="hero-qs-lbl">MTD volume</span></div>';

  let dateEl = document.getElementById('todayDate');
  if (dateEl) {
    dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  window.CapMuseAuth.populateSidebar(rep);
  window.CapMuseAuth.wireLogoutLinks();
  window.CapMuseAuth.applyDemoNav();

  if (window.renderTodayPerfPanel) {
    window.renderTodayPerfPanel(document.getElementById('perfGrid'), userId, { animate: true });
  }

  let compareBtn = document.getElementById('btnCompareStats');
  if (compareBtn) {
    compareBtn.addEventListener('click', function () {
      if (window.CapMuseCompare) window.CapMuseCompare.open();
    });
  }
})();
</script>
