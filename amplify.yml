version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cp -r FrontendUI/* public/
        - cp FrontendUI/login.html public/index.html
    build:
      commands:
        - mkdir -p build
        - cp -r public/* build/
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths: []
